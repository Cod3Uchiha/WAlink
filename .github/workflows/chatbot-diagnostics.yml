name: Chatbot diagnostics

on:
  pull_request:
    branches: [master]

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.9.2 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Capture diagnostics
        shell: bash
        run: |
          set +e
          : > chatbot-diagnostics.txt

          echo '=== TYPESCRIPT ===' >> chatbot-diagnostics.txt
          yarn tsc --noEmit >> chatbot-diagnostics.txt 2>&1
          echo "TSC_EXIT=$?" >> chatbot-diagnostics.txt

          echo '=== PRETTIER ===' >> chatbot-diagnostics.txt
          yarn prettier --check src/Walink/Bot.ts src/Walink/Lite.ts src/Walink/Bot.test.ts >> chatbot-diagnostics.txt 2>&1
          echo "PRETTIER_EXIT=$?" >> chatbot-diagnostics.txt

          echo '=== TEST ===' >> chatbot-diagnostics.txt
          yarn test --runInBand src/Walink/Bot.test.ts >> chatbot-diagnostics.txt 2>&1
          echo "TEST_EXIT=$?" >> chatbot-diagnostics.txt

          cat chatbot-diagnostics.txt
          exit 0

      - uses: actions/upload-artifact@v4
        with:
          name: chatbot-diagnostics
          path: chatbot-diagnostics.txt
