name: API endpoint discovery

on:
  pull_request:
    branches: [master]

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Test public AI endpoints
        shell: bash
        run: |
          set +e
          : > endpoint-discovery.txt

          for endpoint in copilot gpt5; do
            echo "=== /ai/${endpoint} ===" >> endpoint-discovery.txt
            curl --location --silent --show-error --max-time 60 \
              --user-agent 'WAlinkBot/1.0' \
              --header 'Accept: application/json' \
              --write-out '\nHTTP_STATUS=%{http_code}\nCONTENT_TYPE=%{content_type}\n' \
              --get "https://cod3uchiha.com/ai/${endpoint}" \
              --data-urlencode 'text=Reply with only the word working' \
              >> endpoint-discovery.txt 2>&1
            echo >> endpoint-discovery.txt
          done

          cat endpoint-discovery.txt
          exit 0

      - uses: actions/upload-artifact@v4
        with:
          name: endpoint-discovery
          path: endpoint-discovery.txt
